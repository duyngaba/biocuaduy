<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Duy Ngọc</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:url('https://wallpaperaccess.com/full/317501.jpg') no-repeat center/cover;
}

/* FIX overlay KHÔNG CHE */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:0;
}

/* VIEW */
.views{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    z-index:3;
}

/* LAYOUT */
.main{
    display:flex;
    height:100vh;
    position:relative;
    z-index:2;
}

.left{
    width:30%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* STATUS half black white */
.status{
    font-size:22px;
    background:linear-gradient(90deg,#fff 50%,#ff69b4 50%);
    -webkit-background-clip:text;
    color:transparent;
}

/* ICON */
.icons a{
    font-size:40px;
    margin:15px;
    transition:0.3s;
}
.icons a:hover{transform:scale(1.2);}

.facebook{color:#1877f2;}
.tiktok{color:#ff0050;}

/* CANVAS FIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    pointer-events:none;
}

/* SECRET */
#secret{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:999;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="views">👁️ <span id="view">0</span></div>

<div class="main">
<div class="left">
    <h1>Duy Ngọc</h1>
    <p class="status">💔 Đang độc thân</p>

    <div class="icons">
        <a href="https://www.facebook.com/profile.php?id=61582623579599" target="_blank" class="facebook">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.tiktok.com/@duy367daystudyenglish" target="_blank" class="tiktok">
            <i class="fab fa-tiktok"></i>
        </a>
    </div>
</div>
</div>

<canvas id="canvas"></canvas>

<!-- SECRET -->
<div id="secret">
<canvas id="heartCanvas"></canvas>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* VIEW */
let v=localStorage.getItem("v")||0;
v++;
localStorage.setItem("v",v);
document.getElementById("view").innerText=v;

/* HEART */
let hearts=[];
function spawnHeart(){
    hearts.push({
        x:Math.random()*canvas.width,
        y:canvas.height,
        size:Math.random()*10+4,
        speed:Math.random()*2,
        dx:(Math.random()-0.5),
        a:1
    });
}

/* PEOPLE */
let people=[];
for(let i=0;i<80;i++){
    people.push({
        x:Math.random()*canvas.width,
        y:canvas.height-10,
        speed:Math.random()*1,
    });
}

/* VOLCANO */
const volcanoX=canvas.width*0.7;
const volcanoY=canvas.height-120;

const texts=["я и она","我和她","私と彼女","moi et elle"];
let textP=[];

function spawnText(){
    textP.push({
        x:volcanoX,
        y:volcanoY,
        text:texts[Math.random()*texts.length|0],
        dx:(Math.random()-0.5)*3,
        dy:-(Math.random()*3+2),
        a:1
    });
}

/* FIREWORK */
let fireworks=[];
function fire(){
    let x=Math.random()*canvas.width;
    let y=canvas.height/2;

    let arr=[];
    for(let i=0;i<80;i++){
        arr.push({
            x:x,y:y,
            dx:(Math.random()-0.5)*6,
            dy:(Math.random()-0.5)*6,
            a:1,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
    fireworks.push(arr);
}

function drawHeart(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
    ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
    ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
    ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
    ctx.fill();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* HEART */
    hearts.forEach((h,i)=>{
        ctx.globalAlpha=h.a;
        ctx.fillStyle=`hsl(${Math.random()*360},100%,70%)`;
        drawHeart(h.x,h.y,h.size);

        h.y-=h.speed;
        h.x+=h.dx;
        h.a-=0.01;

        if(h.a<=0) hearts.splice(i,1);
    });

    /* PEOPLE */
    ctx.globalAlpha=1;
    ctx.fillStyle="white";
    people.forEach(p=>{
        ctx.fillRect(p.x,p.y,2,2);
        p.x+=p.speed;
        if(p.x>canvas.width)p.x=0;
    });

    /* VOLCANO */
    let grad=ctx.createLinearGradient(volcanoX,volcanoY,volcanoX,canvas.height);
    grad.addColorStop(0,"#ff4d6d");
    grad.addColorStop(1,"#330000");

    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(volcanoX-120,canvas.height);
    ctx.lineTo(volcanoX,volcanoY);
    ctx.lineTo(volcanoX+120,canvas.height);
    ctx.fill();

    /* TEXT */
    textP.forEach((t,i)=>{
        ctx.globalAlpha=t.a;
        ctx.fillStyle="#ff69b4";
        ctx.font="20px Arial";
        ctx.fillText(t.text,t.x,t.y);

        t.x+=t.dx;
        t.y+=t.dy;
        t.a-=0.01;

        if(t.a<=0) textP.splice(i,1);
    });

    /* FIREWORK */
    fireworks.forEach((f,i)=>{
        f.forEach((p,j)=>{
            ctx.globalAlpha=p.a;
            ctx.fillStyle=p.color;
            ctx.fillRect(p.x,p.y,3,3);

            p.x+=p.dx;
            p.y+=p.dy;
            p.a-=0.02;

            if(p.a<=0) f.splice(j,1);
        });

        if(f.length===0) fireworks.splice(i,1);
    });

    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
}

/* spawn */
setInterval(spawnHeart,80);
setInterval(spawnText,300);
setInterval(fire,1200);

draw();

/* SECRET */
let input="";
const password="1234";

document.addEventListener("keydown",e=>{
    input+=e.key;
    if(input.length>password.length) input=input.slice(-password.length);

    if(input===password){
        document.getElementById("secret").style.display="block";
    }
});
</script>

</body>
</html>
