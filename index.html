<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Duy Ngọc</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:black;
}

/* GALAXY BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 30%, #ff00cc44, transparent 50%),
    radial-gradient(circle at 80% 70%, #00ffff44, transparent 50%),
    black;
}

/* INFO */
.left{
    position:absolute;
    left:5%;
    top:30%;
    z-index:2;
}

h1{
    font-size:60px;
    color:#ff00cc;
    text-shadow:0 0 20px #ff00cc,0 0 40px #ff00cc;
}

.status{
    font-size:25px;
    background:linear-gradient(90deg,#fff 50%,#ff00cc 50%);
    -webkit-background-clip:text;
    color:transparent;
}

/* ICON */
.icons a{
    font-size:45px;
    margin:15px;
}
.facebook{color:#1877f2;}
.tiktok{color:#ff0050;}

/* VIEW */
.views{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    z-index:2;
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="views">👁️ <span id="view">0</span></div>

<div class="left">
    <h1>Duy Ngọc</h1>
    <p class="status">💔 Đang độc thân</p>

    <div class="icons">
        <a href="https://www.facebook.com/profile.php?id=61582623579599" target="_blank" class="facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://www.tiktok.com/@duy367daystudyenglish" target="_blank" class="tiktok"><i class="fab fa-tiktok"></i></a>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* VIEW */
let v=localStorage.getItem("v")||0;
v++;
localStorage.setItem("v",v);
document.getElementById("view").innerText=v;

/* HEART */
let hearts=[];
function spawnHeart(){
    hearts.push({
        x:Math.random()*c.width,
        y:c.height,
        size:Math.random()*12+6,
        speed:Math.random()*2,
        a:1
    });
}

/* VOLCANO */
const vx=c.width*0.75;
const vy=c.height-150;

const texts=["я и она","我和她","私と彼女","moi et elle"];
let txt=[];

function spawnText(){
    txt.push({
        x:vx,
        y:vy,
        text:texts[Math.random()*texts.length|0],
        dx:(Math.random()-0.5)*4,
        dy:-(Math.random()*4+2),
        a:1
    });
}

/* FIREWORK */
let fw=[];
function fire(){
    let arr=[];
    let x=Math.random()*c.width;
    let y=c.height/2;

    for(let i=0;i<120;i++){
        arr.push({
            x:x,y:y,
            dx:(Math.random()-0.5)*8,
            dy:(Math.random()-0.5)*8,
            a:1,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
    fw.push(arr);
}

/* HEART DRAW */
function heart(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
    ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
    ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
    ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
    ctx.fill();
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    /* HEART */
    hearts.forEach((h,i)=>{
        ctx.globalAlpha=h.a;
        ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
        ctx.shadowBlur=25;
        ctx.shadowColor=ctx.fillStyle;
        heart(h.x,h.y,h.size);

        h.y-=h.speed;
        h.a-=0.01;

        if(h.a<=0) hearts.splice(i,1);
    });

    /* VOLCANO */
    ctx.shadowBlur=40;
    ctx.shadowColor="#ff00cc";

    let g=ctx.createLinearGradient(vx,vy,vx,c.height);
    g.addColorStop(0,"#ff00cc");
    g.addColorStop(1,"#330000");

    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(vx-150,c.height);
    ctx.lineTo(vx,vy);
    ctx.lineTo(vx+150,c.height);
    ctx.fill();

    ctx.shadowBlur=0;

    /* TEXT */
    txt.forEach((t,i)=>{
        ctx.globalAlpha=t.a;
        ctx.fillStyle="#ff00cc";
        ctx.shadowBlur=20;
        ctx.shadowColor="#ff00cc";
        ctx.font="28px Arial";
        ctx.fillText(t.text,t.x,t.y);

        t.x+=t.dx;
        t.y+=t.dy;
        t.a-=0.01;

        if(t.a<=0) txt.splice(i,1);
    });

    /* FIREWORK */
    fw.forEach((f,i)=>{
        f.forEach((p,j)=>{
            ctx.globalAlpha=p.a;
            ctx.fillStyle=p.color;
            ctx.shadowBlur=15;
            ctx.shadowColor=p.color;
            ctx.fillRect(p.x,p.y,3,3);

            p.x+=p.dx;
            p.y+=p.dy;
            p.a-=0.02;

            if(p.a<=0) f.splice(j,1);
        });

        if(f.length===0) fw.splice(i,1);
    });

    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
}

setInterval(spawnHeart,60);
setInterval(spawnText,300);
setInterval(fire,1000);

draw();
</script>

</body>
</html>
