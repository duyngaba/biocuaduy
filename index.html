<!DOCTYPE html>
<html>
<head>
    <title>Duy Profile</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('https://4kwallpapers.com/images/walls/thumbs_3t/19435.png') no-repeat center center;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .card {
            width: 320px;
            margin: 80px auto;
            padding: 25px;
            background: rgba(0,0,0,0.7);
            border-radius: 18px;
            text-align: center;
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 25px rgba(0,255,204,0.5);
            transition: transform 0.2s;
        }

        img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0 5px;
        }

        .status {
            color: #00ffcc;
            font-size: 14px;
            margin-bottom: 10px;
        }

        p {
            color: #ccc;
            font-size: 14px;
        }

        .links a {
            display: block;
            margin: 8px auto;
            padding: 10px;
            width: 80%;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .links a:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 15px #00ffcc;
        }
    </style>
</head>
<body>

<div id="tsparticles"></div>

<div class="card" id="card">
    <img src="https://via.placeholder.com/120">

    <h1>Ngọc Duy</h1>
    <div class="status">● Độc thân</div>
    <p>Dev | Chill | Anime</p>

    <div class="links">
        <a href="https://www.facebook.com/profile.php?id=61582623579599" target="_blank">
            <i class="fab fa-facebook"></i> Facebook
        </a>
        <a href="https://www.tiktok.com/@duy367daystudyenglish" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
    </div>
</div>


<script>
    // particle nhẹ hơn (đỡ lag)
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 40 },
            color: { value: "#00ffcc" },
            size: { value: 3 },
            move: { enable: true, speed: 0.8 },
            links: {
                enable: true,
                color: "#00ffcc",
                opacity: 0.2
            }
        }
    });

    // card theo chuột (nhẹ hơn)
    const card = document.getElementById("card");
    document.addEventListener("mousemove", (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 40;
        let y = (window.innerHeight / 2 - e.pageY) / 40;
        card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
   

    // fix nhạc
        });
</script>

</body>
</html>
